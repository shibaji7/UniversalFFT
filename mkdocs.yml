site_name: UniversalFFT Documentation
repo_url: https://github.com/shibaji7/UniversalFFT
theme:
  name: "material"
  logo: assets/universalfft.svg
  features:
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.path

plugins:
    - search
    - glightbox
    - awesome-pages
    - mkdocstrings:
        enabled: !ENV [ENABLE_MKDOCSTRINGS, true]
        default_handler: python
        handlers:
          python:
            paths: [".."]
            options:
              show_root_heading: true
              show_source: true
              members_order: source
              show_symbol_type_heading: true
              show_symbol_type_toc: true

markdown_extensions:
    - extra
    - admonition
    - toc
    - tables
    - attr_list
    - toc:
        permalink: true
    - pymdownx.arithmatex:
        generic: true
    - pymdownx.betterem
    - pymdownx.caret
    - pymdownx.mark
    - pymdownx.tilde
    - attr_list
    - md_in_html
    - pymdownx.highlight:
        anchor_linenums: true
        line_spans: __span
        pygments_lang_class: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.superfences
    - pymdownx.tabbed:
        alternate_style: true
    - pymdownx.highlight
    - pymdownx.details
    - footnotes

extra_css:
    - css/universalfft.css

extra_javascript:
    - javascripts/mathjax.js
    - https://polyfill.io/v3/polyfill.min.js?features=es6
    - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
    - Home: index.md
    - Installation: user/install.md
    - Conventions: user/conventions.md
    - Citing: user/citing.md
    - Authors: user/authors.md
    - Examples:
            - Overview: examples/index.md
            - Low-Pass Filter: examples/filter.md
            - Impulse Response: examples/impulse_response.md
            - Spectrum (CD): examples/spectrum.md
            - Cross-Language Demo: examples/cross_language.md
    - API Documentation:
            - Overview: dev/api_index.md
            - Python:
                    - core.py: dev/python/core.md
                    - utils.py: dev/python/utils.md
            - C:
                    - universalfft.h / .c: dev/c/index.md
            - MATLAB:
                    - Functions: dev/matlab/index.md
            - R:
                    - universalfft.R: dev/r/index.md
            - Julia:
                    - UniversalFFT.jl: dev/julia/index.md
            - Fortran:
                    - universalfft.f90: dev/fortran/index.md
            - C++:
                    - universalfft.hpp: dev/cpp/index.md
            - Rust:
                    - lib.rs: dev/rust/index.md
            - CUDA/HIP:
                    - universalfft.cuh / .cu: dev/cuda/index.md
            - JavaScript:
                    - universalfft.js: dev/js/index.md
            - Octave:
                    - universalfft.m: dev/octave/index.md
            - IDL/GDL:
                    - universalfft.pro: dev/idl/index.md
