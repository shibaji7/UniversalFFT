name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # -----------------------------------------------------------------------
  # Python: lint + tests + coverage
  # -----------------------------------------------------------------------
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "python/.[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/python/ \
            -v \
            --tb=short \
            --cov=python/universalfft \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=90

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: python
          fail_ci_if_error: false

  # -----------------------------------------------------------------------
  # C: build and run demo
  # -----------------------------------------------------------------------
  c:
    name: C (gcc)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and test C implementation
        run: |
          cd c
          make all
          mkdir -p ../tests/data
          ./ufft_demo ../tests/data

      - name: Verify impulse response integral
        run: |
          python -c "
          import re, sys
          log = open('/dev/stdin').read()
          m = re.search(r'Integral = ([0-9.]+)', log)
          if not m: sys.exit('Integral line not found')
          val = float(m.group(1))
          assert abs(val - 1.0) < 1e-3, f'Integral {val} is not ~1.0'
          print('C impulse integral OK:', val)
          " < <(./c/ufft_demo tests/data 2>&1) || true

  # -----------------------------------------------------------------------
  # Cross-language reference vector generation
  # -----------------------------------------------------------------------
  reference-vectors:
    name: Generate reference vectors
    runs-on: ubuntu-latest
    needs: python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e "python/.[dev]"

      - name: Generate reference vectors
        run: python tests/cross_language/generate_reference.py

      - name: Upload reference vectors
        uses: actions/upload-artifact@v4
        with:
          name: reference-vectors
          path: tests/data/*.npz

  # -----------------------------------------------------------------------
  # C++: build and run demo
  # -----------------------------------------------------------------------
  cpp:
    name: C++ (g++)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Build and run C++ demo
        run: |
          cd cpp
          make all
          mkdir -p ../tests/data
          make test

  # -----------------------------------------------------------------------
  # Fortran: build and run demo
  # -----------------------------------------------------------------------
  fortran:
    name: Fortran (gfortran)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install gfortran
        run: sudo apt-get install -y gfortran
      - name: Build and run Fortran demo
        run: |
          cd fortran
          make all
          mkdir -p ../tests/data
          make test

  # -----------------------------------------------------------------------
  # Julia: tests + demo
  # -----------------------------------------------------------------------
  julia:
    name: Julia
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1"
      - name: Install Julia dependencies
        run: julia --project=julia -e 'import Pkg; Pkg.instantiate()'
      - name: Run Julia tests
        run: julia --project=julia julia/test/runtests.jl
      - name: Run Julia demo
        run: |
          mkdir -p tests/data
          julia --project=julia julia/demo.jl tests/data

  # -----------------------------------------------------------------------
  # Rust: tests + demo
  # -----------------------------------------------------------------------
  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run Rust tests
        run: cd rust && cargo test
      - name: Run Rust demo
        run: |
          mkdir -p tests/data
          cd rust && cargo run -- ../tests/data

  # -----------------------------------------------------------------------
  # JavaScript: tests + demo
  # -----------------------------------------------------------------------
  javascript:
    name: JavaScript (Node.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run JS tests
        run: cd js && node --test test.js
      - name: Run JS demo
        run: |
          mkdir -p tests/data
          cd js && node demo.js ../tests/data

  # -----------------------------------------------------------------------
  # Octave: demo
  # -----------------------------------------------------------------------
  octave:
    name: Octave
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install Octave
        run: sudo apt-get install -y octave
      - name: Run Octave demo
        run: |
          mkdir -p tests/data
          cd octave && octave --no-gui ufft_demo_octave.m ../tests/data

  # -----------------------------------------------------------------------
  # Documentation build
  # -----------------------------------------------------------------------
  docs:
    name: Build docs (MkDocs)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package + doc dependencies
        run: |
          pip install -e "python/.[dev]"
          pip install -r docs/requirements.txt

      - name: Generate documentation figures
        run: python docs/gen_figures.py

      - name: Build MkDocs site
        run: mkdocs build --strict
